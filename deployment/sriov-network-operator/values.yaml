operator:
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  nodeSelector: {}
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
            - key: "node-role.kubernetes.io/master"
              operator: In
              values: [ "" ]
          - matchExpressions:
              - key: "node-role.kubernetes.io/control-plane"
                operator: In
                values: [ "" ]
  nameOverride: ""
  fullnameOverride: ""
  resourcePrefix: "openshift.io"
  enableAdmissionController: false
  cniBinPath: "/opt/cni/bin"
  clusterType: "kubernetes"

# Image URIs for sriov-network-operator components
images:
  operator: registry.gitlab.com/sonaproject/sriov-network-operator
  sriovConfigDaemon: registry.gitlab.com/sonaproject/sriov-network-config-daemon
  sriovCni: ghcr.io/k8snetworkplumbingwg/sriov-cni
  ibSriovCni: ghcr.io/k8snetworkplumbingwg/ib-sriov-cni
  sriovDevicePlugin: ghcr.io/k8snetworkplumbingwg/sriov-network-device-plugin
  resourcesInjector: ghcr.io/k8snetworkplumbingwg/network-resources-injector
  webhook: registry.gitlab.com/sonaproject/sriov-network-webhook

imagePullSecrets: []
imagePullPolicy: IfNotPresent
